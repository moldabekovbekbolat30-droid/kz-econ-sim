<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ---------- Базовые значения драйверов (индекс = 100%, ставки из macro) ---------- */
function baselineDrivers(DATA){
  return { invest:100, consume:100, tfp:100, labor:100, extDemand:100,
           baseRate:DATA.macro.baseRate, fedRate:DATA.macro.fedRate };
}

/* Форматирование цены сырья в $ за единицу с разумным числом знаков. */
function fmtPrice(v, unit){
  const d = v >= 100 ? 0 : v >= 10 ? 1 : 2;
  return '$' + v.toFixed(d) + (unit ? '/' + unit : '');
}

/* ---------- Экономическая модель (§7.2 PRD v1.1) ---------- */
function computeModel(DATA, priceIdx, importDemand, fiscalShare, drivers){
  const C = DATA.coeffs;
  const exFx = DATA.fx.usdkzt;
  const M = DATA.macro;
  const dr = drivers || baselineDrivers(DATA);

  const exports = DATA.exports.map(e => ({...e, value: e.base * (priceIdx[e.id] ?? 1)}));
  const exportTotal = exports.reduce((s,e)=>s+e.value,0);
  const exportBaseTotal = DATA.exports.reduce((s,e)=>s+e.base,0);
  const resourceExport = exports.filter(e=>e.resource).reduce((s,e)=>s+e.value,0);

  // Курс: экспорт укрепляет (−), ставка ФРС ослабляет (+), ставка НБ РК укрепляет
  const usdkzt = exFx
    * Math.pow(exportTotal/exportBaseTotal, C.fxElasticity)
    * Math.pow(dr.fedRate/M.fedRate, C.fxFedCoeff)
    * Math.pow(M.baseRate/dr.baseRate, C.fxBaseRateCoeff);

  // Бюджет (рента с эффектом рычага)
  const govRev   = M.govResourceRevenue + C.rentRate*(resourceExport - C.resourceBase);
  const windfall = govRev - M.govResourceRevenue;
  const spent    = (fiscalShare/100) * windfall;

  // Рост ВВП = базовый уровень + Σ вкладов (п.п.)
  const gdpContribs = [
    { key:'base',     label:'Базовый уровень', value:M.growth, kind:'base' },
    { key:'resource', label:'Сырьё',           value:C.gdpPriceCoeff*(resourceExport - C.resourceBase) },
    { key:'fiscal',   label:'Бюджет (фиск.)',  value:C.gdpFiscalCoeff*spent/M.gdpNominal*100 },
    { key:'invest',   label:'Инвестиции/FDI',  value:C.gdpInvest*(dr.invest-100) },
    { key:'consume',  label:'Потребление',     value:C.gdpConsume*(dr.consume-100) },
    { key:'extDemand',label:'Внешний спрос',   value:C.gdpExtDemand*(dr.extDemand-100) },
    { key:'tfp',      label:'Производительность', value:C.gdpTfp*(dr.tfp-100) },
    { key:'labor',    label:'Рабочая сила',    value:C.gdpLabor*(dr.labor-100) },
    { key:'baseRate', label:'Ставка НБ РК',    value:C.gdpBaseRate*(dr.baseRate-M.baseRate) },
    { key:'fedRate',  label:'Ставка ФРС',      value:C.gdpFedRate*(dr.fedRate-M.fedRate) },
  ];
  const growth = gdpContribs.reduce((s,c)=>s+c.value,0);

  // Инфляция
  const fxPass     = C.fxPass*(usdkzt/exFx - 1)*100;
  const demandPush = C.demandPush*spent/M.gdpNominal*100;
  const inflation  = M.inflation + fxPass + demandPush
    + C.infConsume*(dr.consume-100) + C.infInvest*(dr.invest-100)
    + C.infBaseRate*(dr.baseRate-M.baseRate) + C.infTfp*(dr.tfp-100);

  // Нацфонд (за год)
  const transfer = M.nfTransfer + spent;
  const nfChange = govRev - transfer + M.nfAssets*C.nfInvestYield;

  // Импорт (эндогенный)
  const incomeFactor = 1 + C.importIncomeElast*(growth - M.growth)/100;
  const fxFactor     = Math.pow(exFx/usdkzt, C.importFxElast);
  const importBaseTotal = DATA.imports.reduce((s,i)=>s+i.base,0);
  const importTotal = importBaseTotal * incomeFactor * fxFactor * (importDemand/100);
  const importScale = importTotal/importBaseTotal;
  const imports = DATA.imports.map(i=>({...i, value:i.base*importScale}));

  const tradeBalance = exportTotal - importTotal;

  return {
    exports, imports, exportTotal, resourceExport, importTotal, tradeBalance,
    usdkzt, govRev, windfall, spent, growth, inflation, transfer, nfChange,
    nfEnd: M.nfAssets + nfChange, gdpContribs, fxPass, demandPush
  };
}

/* ---------- Многолетний прогноз (Фаза 2) ----------
   Carries Нацфонд forward year-over-year; цены сырья дрейфуют на trend%/год.
   Текущие ползунки = шок 1-го года. Инвестдоход НФ зависит от накопленных активов. */
function forecast(DATA, priceIdx, importDemand, fiscalShare, drivers, years, trendPct){
  const rows = [];
  let nf = DATA.macro.nfAssets;
  for(let y=1; y<=years; y++){
    const yIdx = {};
    DATA.exports.forEach(e=>{
      const shock = priceIdx[e.id] ?? 1;
      yIdx[e.id] = e.resource ? shock*Math.pow(1+trendPct/100, y-1) : shock;
    });
    const dataY = {...DATA, macro:{...DATA.macro, nfAssets:nf}};
    const m = computeModel(dataY, yIdx, importDemand, fiscalShare, drivers);
    nf = m.nfEnd;
    rows.push({year:y, exportTotal:m.exportTotal, govRev:m.govRev,
      nfChange:m.nfChange, nfEnd:m.nfEnd, growth:m.growth, inflation:m.inflation});
  }
  return rows;
}

/* ---------- helpers ---------- */
const f1 = n => (n>=0?'':'−')+Math.abs(n).toFixed(1);
const f0 = n => (n>=0?'':'−')+Math.abs(n).toFixed(0);
function Delta({d, suffix='', inverse=false, digits=1}){
  const eps = digits===0?0.5:0.05;
  const good = inverse ? d<0 : d>0;
  const cls = Math.abs(d)<eps ? 'flat' : (good?'up':'down');
  const arrow = Math.abs(d)<eps ? '→' : (d>0?'▲':'▼');
  const v = digits===0?f0(d):f1(d);
  return <span className={'dlt '+cls}>{arrow} {v}{suffix}</span>;
}

/* ---------- KPI strip ---------- */
function KPI({lbl,val,unit,delta,inverse,digits=1}){
  return (
    <div className="kpi">
      <div className="lbl">{lbl}</div>
      <div className="val">{val}<span style={{fontSize:13,color:'var(--muted)'}}> {unit}</span></div>
      <Delta d={delta} inverse={inverse} digits={digits}/>
    </div>
  );
}

/* ---------- Horizontal structure chart (pure CSS) ---------- */
function StructureChart({rows, color}){
  const total = rows.reduce((s,r)=>s+r.scenario,0);
  const max = Math.max(...rows.map(r=>Math.max(r.base,r.scenario)), 0.001);
  return (
    <div>
      {rows.map((r,i)=>{
        const share = total>0 ? r.scenario/total*100 : 0;
        return (

/* ---------- Budget vs NF chart (pure CSS) ---------- */
function BudgetChart({base, scen}){
  const groups = [
    {name:'Доходы бюджета', b:base.govRev,   s:scen.govRev},
    {name:'Трансферт из НФ', b:base.transfer, s:scen.transfer},
    {name:'Δ Нацфонда/год',  b:base.nfChange, s:scen.nfChange},
  ];
  const max = Math.max(...groups.flatMap(g=>[Math.abs(g.b),Math.abs(g.s)]), 0.001);
  const h = v => Math.max(Math.abs(v)/max*100, 1.5);
  return (
    <div>
      <div className="bgroup">
        {groups.map((g,i)=>(
          <div className="bgcol" key={i}>
            <div className="pair">
              <div className="bar" style={{height:h(g.b)+'%',background:'#24454c'}}>{g.b.toFixed(0)}</div>
              <div className="bar" style={{height:h(g.s)+'%',background: g.s<0?'#f4736b':'#e8b84b',
                color: g.s<0?'#fff':'#2a1d00'}}>{g.s.toFixed(0)}</div>
            </div>
          </div>
        ))}
      </div>
      <div className="bglabels">
        {groups.map((g,i)=><div className="l" key={i}>{g.name}</div>)}
      </div>
      <div className="legend">
        <span><i style={{background:'#24454c'}}/>База</span>
        <span><i style={{background:'#e8b84b'}}/>Сценарий</span>
      </div>
    </div>
  );
}

/* ---------- NF trajectory chart (Phase 2) ---------- */
function TrajectoryChart({base, scen}){
  const max = Math.max(...scen.map(r=>r.nfEnd), ...base.map(r=>r.nfEnd), 1);
  return (
    <div>
      <div className="traj">
        {scen.map((r,i)=>{
          const bnf = base[i].nfEnd;
          return (
            <div className="yr" key={i}>
              <div className="stack">
                <div className="fbar" style={{height:(r.nfEnd/max*100)+'%'}}>${r.nfEnd.toFixed(0)}</div>
                <div className="basemark" style={{bottom:(bnf/max*100)+'%'}} title={'база $'+bnf.toFixed(0)}/>
              </div>
            </div>
          );
        })}
      </div>
      <div className="traj-x">

      <div className="legend">

      </div>
    </div>
  );
}

/* ---------- GDP growth decomposition (waterfall, pure CSS) ---------- */
function DecompChart({contribs, growth}){
  // Кумулятивная раскладка: базовый уровень + каждый вклад → итог.
  const rows = [];
  let cum = 0;
  contribs.forEach(c=>{
    if(c.kind==='base'){ rows.push({label:c.label, start:0, val:c.value, kind:'base'}); cum=c.value; }
    else { rows.push({label:c.label, start:cum, val:c.value, kind:c.value>=0?'pos':'neg'}); cum+=c.value; }
  });
  rows.push({label:'Итог', start:0, val:growth, kind:'total'});
  const max = Math.max(growth, ...rows.map(r=>r.start+Math.max(r.val,0)), 0.001);
  const scale = v => v/max*100;
  const color = {base:'#5a6f74', pos:'#2fd6c3', neg:'#f4736b', total:'#e8b84b'};
  return (
    <div>
      {rows.map((r,i)=>{
        const left = scale(Math.min(r.start, r.start+r.val));
        const w = Math.max(scale(Math.abs(r.val)), 0.6);
        const near = Math.abs(r.val)<0.05 && r.kind!=='base' && r.kind!=='total';
        return (
          <div className={'wf-row '+r.kind} key={i}>
            <span className="nm">{r.label}</span>
            <div className="wf-track">
              <div className="wf-seg" style={{left:left+'%',width:w+'%',
                background: near?'#2a4046':color[r.kind]}}/>
            </div>
            <span className="pp" style={{color: r.kind==='neg'?'var(--neg)':(r.kind==='pos'?'var(--pos)':'#cfe1e0')}}>
              {r.kind==='base'||r.kind==='total' ? r.val.toFixed(1) : (r.val>=0?'+':'−')+Math.abs(r.val).toFixed(2)}
            </span>
          </div>
        );
      })}
      <div className="legend">
        <span><i style={{background:'#2fd6c3'}}/>Положительный вклад</span>
        <span><i style={{background:'#f4736b'}}/>Отрицательный</span>
        <span><i style={{background:'#e8b84b'}}/>Итоговый рост ВВП</span>
      </div>
    </div>
  );
}

              Стартовый шок 1-го года = текущие ползунки на вкладках «Торговля» и «Макроэкономика».
              Далее цены сырья меняются на <b className="mono">{trendPct>0?'+':''}{trendPct}%</b> ежегодно,
              Нацфонд накапливается с учётом инвестдохода.
            </div>
            <div className="cards4" style={{marginTop:14,gridTemplateColumns:'1fr 1fr'}}>
              <div className="mini"><div className="lbl">НФ через {horizon} лет</div>
                <div className="val">${last.nfEnd.toFixed(0)}</div>
                <Delta d={last.nfEnd-lastB.nfEnd} digits={0}/></div>
              <div className="mini"><div className="lbl">Δ к базе</div>
                <div className="val">${f0(last.nfEnd-lastB.nfEnd)}</div>
                <span className="dlt flat">млрд</span></div>
            </div>
          </div>

          <div className="grid">
            <div className="card">
              <h3>Накопление Нацфонда · {horizon} лет</h3>
              <TrajectoryChart base={fcBase} scen={fcScen}/>
            </div>
            <div className="card">
              <h3>По годам</h3>
              <table>
                <thead><tr><th>Год</th><th>Экспорт</th><th>Доходы бюджета</th><th>Δ НФ</th><th>Активы НФ</th></tr></thead>
                <tbody>
                  {fcScen.map((r,i)=>(
                    <tr key={i}>
                      <td>{r.year}</td>
                      <td className="mono">${r.exportTotal.toFixed(1)}</td>
                      <td className="mono">${r.govRev.toFixed(1)}</td>
                      <td className="mono">${f1(r.nfChange)}</td>
                      <td className="mono" style={{color:'var(--teal)'}}>${r.nfEnd.toFixed(1)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
        );
      })()}

      {tab==='src' && (
        <div className="grid">
          <div className="card">
            <h3>Источники данных</h3>
            <div className="sub" style={{marginBottom:12}}>
              Дата последнего обновления: <span className="pill">{DATA.updated}</span>
              &nbsp; режим данных: <span className="pill">{DATA.source||'—'}</span>
              &nbsp; база: <span className="pill" style={{color:'var(--teal)'}}>{DATA.baselineSource||'ручная калибровка 2025–2026'}</span>
            </div>
            <table>
              <thead><tr><th>Показатель</th><th>Источник</th><th>Эндпоинт</th><th>Формат</th></tr></thead>
              <tbody>
                {SOURCES.map((r,i)=>(
                  <tr key={i}><td>{r[0]}</td><td>{r[1]}</td><td><code>{r[2]}</code></td><td>{r[3]}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
          <div className="card">
            <h3>Запуск пайплайна</h3>
            <pre>{`# прогноз TimesFM как база (опционально — иначе ручная калибровка)
export GCP_PROJECT=...                       # проект GCP с BigQuery
export GOOGLE_APPLICATION_CREDENTIALS=key.json
pip install -r data_pipeline/requirements.txt

# ключи внешних источников (опц. — иначе fallback)
export COMTRADE_KEY=...   # UN Comtrade
export EIA_KEY=...        # EIA energy prices

# сборка артефакта: прогноз + источники → kz_model_data.json
python3 kz_data_pipeline.py

# по расписанию: GitHub Actions .github/workflows/refresh-data.yml
# (ключ — в секрете репозитория GCP_SA_KEY, в код не попадает)`}</pre>
            <div className="sub" style={{marginTop:10}}>
              База берётся из прогноза BigQuery/TimesFM; при недоступности BigQuery симулятор
              использует последние значения из <code className="mono">kz_model_data.json</code> и не падает.
            </div>
          </div>
        </div>
      )}

      <div className="sub" style={{marginTop:24,textAlign:'center'}}>
        Все коэффициенты иллюстративные и вынесены в <code className="mono" style={{color:'var(--teal)'}}>kz_model_data.json → coeffs</code>. Модель статическая, однопериодная.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
